mode:
  develop: true #是否是开发环境

DB:
  driver: sqlite
  dsn: ./data/ohome.db
  MaxIdleConns: 10 #最多空闲连接数
  MaxOpenConns: 100 #最多打开连接数
  AutoMigrate: true
  InitData: true
  InitSQLPath: ./sql/init_data.sql
  ImportInitSQLOnFirstRun: true

server:
  port: 18090

logger:
  MaxSize: 1
  MaxBackups: 90 #切割日志文件的最大个数
  MaxAge: 20 #切割文件保留的最长天数

jwt:
  accessTokenExpires: 1440
  refreshTokenExpires: 14400
  signKey: hlw123.com

config:
  defaultPassword: 123
  allowUserRegistration: true

drops:
  itemReminderDays: "7,3,1,0" # 物资到期提醒：提前 7/3/1 天和当天
  eventReminderDays: "7,3,1,0" # 重要日期提醒：提前 7/3/1 天和当天
