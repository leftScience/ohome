name: Server Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: end/go.mod
          cache-dependency-path: end/go.sum

      - name: Build server release packages
        run: bash scripts/build-server-release-packages.sh

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-release-packages
          path: |
            dist/server-release/ohome-server_windows_amd64.zip
            dist/server-release/ohome-server_darwin_amd64.zip
            dist/server-release/ohome-server_darwin_arm64.zip
            dist/server-release/server-manifest.json
            dist/server-release/checksums.txt

  smoke-test:
    needs: build-packages
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: ohome-server_windows_amd64.zip
            runs_on: windows-latest
            package_dir: ohome-server_windows_amd64
            binary_name: ohome.exe
            start_script: start.bat
            shell_name: pwsh
            script_port: 28191
            binary_port: 28192
          - package_name: ohome-server_darwin_amd64.zip
            runs_on: macos-15-intel
            package_dir: ohome-server_darwin_amd64
            binary_name: ohome
            start_script: start.command
            shell_name: bash
            script_port: 28291
            binary_port: 28292
          - package_name: ohome-server_darwin_arm64.zip
            runs_on: macos-15
            package_dir: ohome-server_darwin_arm64
            binary_name: ohome
            start_script: start.command
            shell_name: bash
            script_port: 28391
            binary_port: 28392

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: server-release-packages
          path: dist/server-release

      - name: Smoke test Windows package
        if: matrix.shell_name == 'pwsh'
        shell: pwsh
        run: |
          $archivePath = Join-Path $PWD "dist/server-release/${{ matrix.package_name }}"
          $extractRoot = Join-Path $env:RUNNER_TEMP "${{ matrix.package_dir }}"
          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

          $packageDir = $extractRoot
          $version = (Get-Content (Join-Path $packageDir "current.txt") -Raw).Trim()
          $scriptPath = Join-Path $packageDir "${{ matrix.start_script }}"
          $binaryPath = Join-Path $packageDir "versions/$version/${{ matrix.binary_name }}"
          $scriptStdOut = Join-Path $env:RUNNER_TEMP "${{ matrix.package_dir }}-script.stdout.log"
          $scriptStdErr = Join-Path $env:RUNNER_TEMP "${{ matrix.package_dir }}-script.stderr.log"
          $binaryStdOut = Join-Path $env:RUNNER_TEMP "${{ matrix.package_dir }}-binary.stdout.log"
          $binaryStdErr = Join-Path $env:RUNNER_TEMP "${{ matrix.package_dir }}-binary.stderr.log"
          $scriptProcess = $null
          $binaryProcess = $null

          $startServer = {
            param([string]$filePath, [string]$workingDir, [int]$port, [string]$stdoutPath, [string]$stderrPath)

            Remove-Item $stdoutPath, $stderrPath -Force -ErrorAction SilentlyContinue

            if ($filePath.EndsWith(".bat")) {
              return Start-Process -FilePath "cmd.exe" `
                -ArgumentList "/d", "/s", "/c", "set `"SERVER_PORT=$port`" && set `"GIN_MODE=release`" && call `"$filePath`"" `
                -WorkingDirectory $workingDir `
                -RedirectStandardOutput $stdoutPath `
                -RedirectStandardError $stderrPath `
                -PassThru
            }

            return Start-Process -FilePath "cmd.exe" `
              -ArgumentList "/d", "/s", "/c", "set `"SERVER_PORT=$port`" && set `"GIN_MODE=release`" && set `"OHOME_BASE_DIR=$packageDir`" && `"$filePath`"" `
              -WorkingDirectory $workingDir `
              -RedirectStandardOutput $stdoutPath `
              -RedirectStandardError $stderrPath `
              -PassThru
          }

          $waitForServer = {
            param([int]$port)

            for ($i = 0; $i -lt 30; $i++) {
              try {
                Invoke-WebRequest -Uri "http://127.0.0.1:$port/swagger/index.html" -UseBasicParsing | Out-Null
                return
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            throw "Server did not become ready"
          }

          $showLogs = {
            param([string[]]$paths)

            foreach ($path in $paths) {
              if (Test-Path $path) {
                Write-Host "--- $path"
                Get-Content $path
              }
            }
          }

          try {
            $scriptProcess = & $startServer $scriptPath $packageDir ${{ matrix.script_port }} $scriptStdOut $scriptStdErr
            & $waitForServer ${{ matrix.script_port }}

            if (-not (Test-Path (Join-Path $packageDir "data/ohome.db"))) {
              throw "SQLite database file was not created"
            }
            if (-not (Test-Path (Join-Path $packageDir "ohome-updater.exe"))) {
              throw "Updater binary missing"
            }
            if (-not (Get-ChildItem (Join-Path $packageDir "log/*.log") -ErrorAction SilentlyContinue)) {
              throw "Log file was not created"
            }

            Get-Process ohome, ohome-updater -ErrorAction SilentlyContinue | Stop-Process -Force
            Start-Sleep -Seconds 2

            $outsideDir = Join-Path $env:RUNNER_TEMP "outside"
            New-Item -ItemType Directory -Path $outsideDir -Force | Out-Null
            $binaryProcess = & $startServer $binaryPath $outsideDir ${{ matrix.binary_port }} $binaryStdOut $binaryStdErr
            & $waitForServer ${{ matrix.binary_port }}

            if (-not (Test-Path (Join-Path $packageDir "data/ohome.db"))) {
              throw "SQLite database file was not preserved after binary launch"
            }
          } catch {
            & $showLogs @($scriptStdOut, $scriptStdErr, $binaryStdOut, $binaryStdErr)
            throw
          } finally {
            Get-Process ohome, ohome-updater -ErrorAction SilentlyContinue | Stop-Process -Force
            foreach ($proc in @($scriptProcess, $binaryProcess)) {
              if ($null -ne $proc) {
                Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              }
            }
          }

      - name: Smoke test macOS package
        if: matrix.shell_name == 'bash'
        shell: bash
        run: |
          archive_path="$PWD/dist/server-release/${{ matrix.package_name }}"
          package_dir="$RUNNER_TEMP/${{ matrix.package_dir }}"
          mkdir -p "$package_dir"
          unzip -q "$archive_path" -d "$package_dir"
          version="$(tr -d '\r\n' < "$package_dir/current.txt")"

          chmod +x "$package_dir/versions/$version/${{ matrix.binary_name }}" "$package_dir/${{ matrix.start_script }}" "$package_dir/ohome-updater"

          start_and_wait() {
            local launch_dir="$1"
            local command_path="$2"
            local pid_file="$3"
            local port="$4"

            (
              cd "$launch_dir"
              OHOME_BASE_DIR="$package_dir" SERVER_PORT="$port" "$command_path" >"$RUNNER_TEMP/server.log" 2>&1 &
              echo $! >"$pid_file"
            )

            for _ in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:$port/swagger/index.html" >/dev/null; then
                return 0
              fi
              sleep 1
            done

            return 1
          }

          cleanup() {
            if [[ -f "$1" ]]; then
              kill "$(cat "$1")" >/dev/null 2>&1 || true
            fi
            pkill -f "$package_dir/versions/$version/${{ matrix.binary_name }}" >/dev/null 2>&1 || true
            pkill -f "$package_dir/ohome-updater" >/dev/null 2>&1 || true
          }

          pid_script="$RUNNER_TEMP/${{ matrix.package_dir }}-script.pid"
          pid_binary="$RUNNER_TEMP/${{ matrix.package_dir }}-binary.pid"

          trap 'cleanup "$pid_script"; cleanup "$pid_binary"' EXIT

          start_and_wait "$package_dir" "$package_dir/${{ matrix.start_script }}" "$pid_script" "${{ matrix.script_port }}"
          test -f "$package_dir/data/ohome.db"
          ls "$package_dir"/log/*.log >/dev/null
          cleanup "$pid_script"
          sleep 2

          outside_dir="$RUNNER_TEMP/outside-${{ matrix.package_dir }}"
          mkdir -p "$outside_dir"
          start_and_wait "$outside_dir" "$package_dir/versions/$version/${{ matrix.binary_name }}" "$pid_binary" "${{ matrix.binary_port }}"
          test -f "$package_dir/data/ohome.db"

  publish-release:
    if: github.ref_type == 'tag'
    needs:
      - build-packages
      - smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: server-release-packages
          path: dist/server-release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/server-release/ohome-server_windows_amd64.zip
            dist/server-release/ohome-server_darwin_amd64.zip
            dist/server-release/ohome-server_darwin_arm64.zip
            dist/server-release/server-manifest.json
            dist/server-release/checksums.txt
