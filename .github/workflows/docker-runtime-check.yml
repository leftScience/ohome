name: Docker Runtime Check

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  verify-docker-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read runtime version baseline
        shell: bash
        run: |
          RUNTIME_VERSION="$(tr -d '\r\n' < end/runtime-version.txt)"
          if [[ -z "${RUNTIME_VERSION}" ]]; then
            echo "::error::end/runtime-version.txt is empty."
            exit 1
          fi
          echo "RUNTIME_VERSION=${RUNTIME_VERSION}" >> "$GITHUB_ENV"

      - name: Derive build metadata
        id: meta
        shell: bash
        run: |
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image without push
        uses: docker/build-push-action@v6
        with:
          context: ./end
          file: ./end/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=check
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            CHANNEL=stable
            RUNTIME_VERSION=${{ env.RUNTIME_VERSION }}
            DEFAULT_UPDATE_MANIFEST_URL=https://example.invalid/server/server.json
          cache-from: type=gha
          cache-to: type=gha,mode=max
