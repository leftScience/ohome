name: Server Binary Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-server-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_format: tar.gz
            asset_name: ohome-linux-amd64.tar.gz
            asset_stem: ohome-linux-amd64
            executable_ext: ""
          - goos: linux
            goarch: arm64
            archive_format: tar.gz
            asset_name: ohome-linux-arm64.tar.gz
            asset_stem: ohome-linux-arm64
            executable_ext: ""
          - goos: windows
            goarch: amd64
            archive_format: zip
            asset_name: ohome-windows-amd64.zip
            asset_stem: ohome-windows-amd64
            executable_ext: ".exe"
          - goos: darwin
            goarch: amd64
            archive_format: tar.gz
            asset_name: ohome-darwin-amd64.tar.gz
            asset_stem: ohome-darwin-amd64
            executable_ext: ""
          - goos: darwin
            goarch: arm64
            archive_format: tar.gz
            asset_name: ohome-darwin-arm64.tar.gz
            asset_stem: ohome-darwin-arm64
            executable_ext: ""

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read runtime version baseline
        shell: bash
        run: |
          RUNTIME_VERSION="$(tr -d '\r\n' < end/runtime-version.txt)"
          if [[ -z "${RUNTIME_VERSION}" ]]; then
            echo "::error::end/runtime-version.txt is empty."
            exit 1
          fi
          {
            echo "RUNTIME_VERSION=${RUNTIME_VERSION}"
            echo "MIN_RUNTIME_VERSION=${RUNTIME_VERSION}"
            echo "RECOMMENDED_RUNTIME_VERSION=${RUNTIME_VERSION}"
          } >> "$GITHUB_ENV"

      - name: Derive packaged manifest URLs
        shell: bash
        run: |
          GITHUB_MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/server.json"
          MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
          MINIO_ENDPOINT="${MINIO_ENDPOINT%/}"
          MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"
          MINIO_PUBLIC_BASE_URL="${{ secrets.MINIO_PUBLIC_BASE_URL }}"
          MINIO_PUBLIC_BASE_URL="${MINIO_PUBLIC_BASE_URL%/}"

          if [[ -n "${MINIO_PUBLIC_BASE_URL}" ]]; then
            PACKAGED_UPDATE_MANIFEST_URLS="${GITHUB_MANIFEST_URL},${MINIO_PUBLIC_BASE_URL}/server/server.json"
          elif [[ -n "${MINIO_ENDPOINT}" && -n "${MINIO_BUCKET}" ]]; then
            PACKAGED_UPDATE_MANIFEST_URLS="${GITHUB_MANIFEST_URL},${MINIO_ENDPOINT}/${MINIO_BUCKET}/server/server.json"
          else
            PACKAGED_UPDATE_MANIFEST_URLS="${GITHUB_MANIFEST_URL}"
          fi

          echo "PACKAGED_UPDATE_MANIFEST_URLS=${PACKAGED_UPDATE_MANIFEST_URLS}" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: end/go.mod
          cache-dependency-path: end/go.sum

      - name: Build packaged binaries
        shell: bash
        working-directory: end
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          ASSET_NAME: ${{ matrix.asset_name }}
          ASSET_STEM: ${{ matrix.asset_stem }}
          EXECUTABLE_EXT: ${{ matrix.executable_ext }}
        run: |
          set -euo pipefail

          OUTPUT_ROOT="../dist/server-release/${ASSET_STEM}"
          BIN_DIR="${OUTPUT_ROOT}/bin"
          CONF_DIR="${OUTPUT_ROOT}/conf"
          SQL_DIR="${OUTPUT_ROOT}/sql"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          rm -rf "${OUTPUT_ROOT}"
          mkdir -p "${BIN_DIR}" "${CONF_DIR}" "${SQL_DIR}"

          SERVER_OUTPUT="${BIN_DIR}/server${EXECUTABLE_EXT}"
          LAUNCHER_OUTPUT="${OUTPUT_ROOT}/launcher${EXECUTABLE_EXT}"

          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 GOTOOLCHAIN=auto GOPROXY=https://goproxy.cn,direct \
            go build \
            -ldflags="-X 'ohome/buildinfo.Version=${GITHUB_REF_NAME}' -X 'ohome/buildinfo.Commit=${GITHUB_SHA}' -X 'ohome/buildinfo.BuildTime=${BUILD_TIME}' -X 'ohome/buildinfo.Channel=stable'" \
            -o "${SERVER_OUTPUT}" .

          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 GOTOOLCHAIN=auto GOPROXY=https://goproxy.cn,direct \
            go build \
            -ldflags="-X 'ohome/buildinfo.Version=${GITHUB_REF_NAME}' -X 'ohome/buildinfo.Commit=${GITHUB_SHA}' -X 'ohome/buildinfo.BuildTime=${BUILD_TIME}' -X 'ohome/buildinfo.Channel=stable' -X 'ohome/buildinfo.RuntimeVersion=${RUNTIME_VERSION}'" \
            -o "${LAUNCHER_OUTPUT}" ./cmd/launcher

          cp conf/config.release.yaml "${CONF_DIR}/config.yaml"
          export CONF_DIR
          python3 - <<'PY'
          import os
          from pathlib import Path

          config_path = Path(os.environ["CONF_DIR"]) / "config.yaml"
          manifest_url = os.environ["PACKAGED_UPDATE_MANIFEST_URLS"].strip()
          original = config_path.read_text(encoding="utf-8")
          target = '  manifestUrl: ""'
          if target not in original:
            raise SystemExit(f"missing manifestUrl placeholder in {config_path}")
          config_path.write_text(
              original.replace(target, f'  manifestUrl: "{manifest_url}"', 1),
              encoding="utf-8",
          )
          PY
          cp sql/init_data.sql "${SQL_DIR}/init_data.sql"
          printf "%s" "${GITHUB_REF_NAME}" > "${BIN_DIR}/server.version"

          if [[ "${GOOS}" != "windows" ]]; then
            chmod +x "${SERVER_OUTPUT}" "${LAUNCHER_OUTPUT}"
          fi

          pushd "${OUTPUT_ROOT}" >/dev/null
          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            zip -qr "../${ASSET_NAME}" .
          else
            tar -czf "../${ASSET_NAME}" .
          fi
          popd >/dev/null

          SHA256="$(sha256sum "../dist/server-release/${ASSET_NAME}" | awk '{print $1}')"
          printf "%s  %s\n" "${SHA256}" "${ASSET_NAME}" > "../dist/server-release/${ASSET_NAME}.sha256"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: server-package-${{ matrix.asset_stem }}
          path: |
            dist/server-release/${{ matrix.asset_name }}
            dist/server-release/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  publish-server-release:
    runs-on: ubuntu-latest
    needs:
      - build-server-packages

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read runtime version baseline
        shell: bash
        run: |
          RUNTIME_VERSION="$(tr -d '\r\n' < end/runtime-version.txt)"
          if [[ -z "${RUNTIME_VERSION}" ]]; then
            echo "::error::end/runtime-version.txt is empty."
            exit 1
          fi
          {
            echo "MIN_RUNTIME_VERSION=${RUNTIME_VERSION}"
            echo "RECOMMENDED_RUNTIME_VERSION=${RUNTIME_VERSION}"
          } >> "$GITHUB_ENV"

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: server-package-*
          path: dist/server-release
          merge-multiple: true

      - name: Generate manifests and checksums
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_DIR="dist/server-release"
          REPO_RELEASE_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          VERSIONED_MANIFEST="${OUTPUT_DIR}/server-${GITHUB_REF_NAME}.json"
          ROLLING_MANIFEST="${OUTPUT_DIR}/server.json"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          LINUX_AMD64_SHA256="$(awk '{print $1}' "${OUTPUT_DIR}/ohome-linux-amd64.tar.gz.sha256")"
          LINUX_ARM64_SHA256="$(awk '{print $1}' "${OUTPUT_DIR}/ohome-linux-arm64.tar.gz.sha256")"
          WINDOWS_AMD64_SHA256="$(awk '{print $1}' "${OUTPUT_DIR}/ohome-windows-amd64.zip.sha256")"
          DARWIN_AMD64_SHA256="$(awk '{print $1}' "${OUTPUT_DIR}/ohome-darwin-amd64.tar.gz.sha256")"
          DARWIN_ARM64_SHA256="$(awk '{print $1}' "${OUTPUT_DIR}/ohome-darwin-arm64.tar.gz.sha256")"

          cat > "${OUTPUT_DIR}/checksums-server.txt" <<EOF
          ${LINUX_AMD64_SHA256}  ohome-linux-amd64.tar.gz
          ${LINUX_ARM64_SHA256}  ohome-linux-arm64.tar.gz
          ${WINDOWS_AMD64_SHA256}  ohome-windows-amd64.zip
          ${DARWIN_AMD64_SHA256}  ohome-darwin-amd64.tar.gz
          ${DARWIN_ARM64_SHA256}  ohome-darwin-arm64.tar.gz
          EOF

          VERSION="${GITHUB_REF_NAME}" \
          CHANNEL="stable" \
          BUILD_TIME="${BUILD_TIME}" \
          RELEASE_NOTES="Release ${GITHUB_REF_NAME}" \
          MIN_RUNTIME_VERSION="${MIN_RUNTIME_VERSION}" \
          RECOMMENDED_RUNTIME_VERSION="${RECOMMENDED_RUNTIME_VERSION}" \
          LINUX_AMD64_URL="${REPO_RELEASE_BASE}/ohome-linux-amd64.tar.gz" \
          LINUX_AMD64_SHA256="${LINUX_AMD64_SHA256}" \
          LINUX_AMD64_FORMAT="tar.gz" \
          LINUX_ARM64_URL="${REPO_RELEASE_BASE}/ohome-linux-arm64.tar.gz" \
          LINUX_ARM64_SHA256="${LINUX_ARM64_SHA256}" \
          LINUX_ARM64_FORMAT="tar.gz" \
          WINDOWS_AMD64_URL="${REPO_RELEASE_BASE}/ohome-windows-amd64.zip" \
          WINDOWS_AMD64_SHA256="${WINDOWS_AMD64_SHA256}" \
          WINDOWS_AMD64_FORMAT="zip" \
          DARWIN_AMD64_URL="${REPO_RELEASE_BASE}/ohome-darwin-amd64.tar.gz" \
          DARWIN_AMD64_SHA256="${DARWIN_AMD64_SHA256}" \
          DARWIN_AMD64_FORMAT="tar.gz" \
          DARWIN_ARM64_URL="${REPO_RELEASE_BASE}/ohome-darwin-arm64.tar.gz" \
          DARWIN_ARM64_SHA256="${DARWIN_ARM64_SHA256}" \
          DARWIN_ARM64_FORMAT="tar.gz" \
          bash scripts/generate-server-binary-manifest.sh "${VERSIONED_MANIFEST}"

          cp "${VERSIONED_MANIFEST}" "${ROLLING_MANIFEST}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/server-release/ohome-linux-amd64.tar.gz
            dist/server-release/ohome-linux-arm64.tar.gz
            dist/server-release/ohome-windows-amd64.zip
            dist/server-release/ohome-darwin-amd64.tar.gz
            dist/server-release/ohome-darwin-arm64.tar.gz
            dist/server-release/server.json
            dist/server-release/server-${{ github.ref_name }}.json
            dist/server-release/checksums-server.txt

      - name: Prepare optional MinIO settings
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ secrets.MINIO_ENDPOINT }}" && -n "${{ secrets.MINIO_ACCESS_KEY }}" && -n "${{ secrets.MINIO_SECRET_KEY }}" && -n "${{ secrets.MINIO_BUCKET }}" ]]; then
            MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
            MINIO_ENDPOINT="${MINIO_ENDPOINT%/}"
            MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"
            MINIO_PUBLIC_BASE_URL="${{ secrets.MINIO_PUBLIC_BASE_URL }}"
            MINIO_PUBLIC_BASE_URL="${MINIO_PUBLIC_BASE_URL%/}"
            if [[ -z "${MINIO_PUBLIC_BASE_URL}" ]]; then
              MINIO_PUBLIC_BASE_URL="${MINIO_ENDPOINT}/${MINIO_BUCKET}"
            fi

            {
              echo "DO_MINIO_UPLOAD=true"
              echo "MINIO_ENDPOINT=${MINIO_ENDPOINT}"
              echo "MINIO_BUCKET=${MINIO_BUCKET}"
              echo "MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL}"
              echo "RELEASE_PREFIX=server/releases/${GITHUB_REF_NAME}"
            } >> "$GITHUB_ENV"
          else
            echo "DO_MINIO_UPLOAD=false" >> "$GITHUB_ENV"
          fi

      - name: Ensure AWS CLI
        if: env.DO_MINIO_UPLOAD == 'true'
        shell: bash
        run: |
          if command -v aws >/dev/null 2>&1; then
            aws --version
          else
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
            aws --version
          fi

      - name: Upload compatibility copy to MinIO
        if: env.DO_MINIO_UPLOAD == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail

          aws configure set default.s3.addressing_style path
          OUTPUT_DIR="dist/server-release"

          for asset in \
            ohome-linux-amd64.tar.gz \
            ohome-linux-arm64.tar.gz \
            ohome-windows-amd64.zip \
            ohome-darwin-amd64.tar.gz \
            ohome-darwin-arm64.tar.gz \
            checksums-server.txt \
            server-${GITHUB_REF_NAME}.json; do
            content_type="application/octet-stream"
            case "${asset}" in
              *.json) content_type="application/json" ;;
              *.txt) content_type="text/plain; charset=utf-8" ;;
              *.tar.gz) content_type="application/gzip" ;;
              *.zip) content_type="application/zip" ;;
            esac
            aws s3 cp "${OUTPUT_DIR}/${asset}" \
              "s3://${MINIO_BUCKET}/${RELEASE_PREFIX}/${asset}" \
              --endpoint-url "${MINIO_ENDPOINT}" \
              --content-type "${content_type}"
          done

          aws s3 cp "${OUTPUT_DIR}/server.json" \
            "s3://${MINIO_BUCKET}/server/server.json" \
            --endpoint-url "${MINIO_ENDPOINT}" \
            --content-type "application/json" \
            --cache-control "no-cache,no-store,must-revalidate"
