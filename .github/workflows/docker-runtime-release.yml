name: Docker Runtime Release

on:
  workflow_dispatch:
    inputs:
      runtime_version:
        description: Runtime image tag, for example runtime-v2026.03.1
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-runtime-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate runtime version baseline
        shell: bash
        run: |
          FILE_RUNTIME_VERSION="$(tr -d '\r\n' < end/runtime-version.txt)"
          if [[ -z "${FILE_RUNTIME_VERSION}" ]]; then
            echo "::error::end/runtime-version.txt is empty."
            exit 1
          fi
          if [[ "${FILE_RUNTIME_VERSION}" != "${{ inputs.runtime_version }}" ]]; then
            echo "::error::workflow input runtime_version=${{ inputs.runtime_version }} does not match end/runtime-version.txt=${FILE_RUNTIME_VERSION}."
            exit 1
          fi

      - name: Derive baked manifest URLs
        shell: bash
        run: |
          GITHUB_MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/server.json"
          MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
          MINIO_ENDPOINT="${MINIO_ENDPOINT%/}"
          MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"
          MINIO_PUBLIC_BASE_URL="${{ secrets.MINIO_PUBLIC_BASE_URL }}"
          MINIO_PUBLIC_BASE_URL="${MINIO_PUBLIC_BASE_URL%/}"

          if [[ -z "${MINIO_PUBLIC_BASE_URL}" ]]; then
            if [[ -z "${MINIO_ENDPOINT}" || -z "${MINIO_BUCKET}" ]]; then
              echo "::error::Missing MINIO_PUBLIC_BASE_URL, or MINIO_ENDPOINT + MINIO_BUCKET for baked manifest URL."
              exit 1
            fi
            MINIO_PUBLIC_BASE_URL="${MINIO_ENDPOINT}/${MINIO_BUCKET}"
          fi

          echo "DEFAULT_UPDATE_MANIFEST_URL=${MINIO_PUBLIC_BASE_URL}/server/server.json,${GITHUB_MANIFEST_URL}" >> "$GITHUB_ENV"

      - name: Derive image names
        id: images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "::error::Missing DOCKERHUB_USERNAME secret."
            exit 1
          fi

          if [[ -z "$DOCKERHUB_TOKEN" ]]; then
            echo "::error::Missing DOCKERHUB_TOKEN secret."
            exit 1
          fi

          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name="${repo_name,,}"

          echo "ghcr_server=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_server=docker.io/${DOCKERHUB_USERNAME,,}/${repo_name}" >> "$GITHUB_OUTPUT"

      - name: Derive build metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION="$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          {
            echo "app_version=${APP_VERSION}"
            echo "build_time=${BUILD_TIME}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract runtime Docker metadata
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.images.outputs.ghcr_server }}
            ${{ steps.images.outputs.dockerhub_server }}
          tags: |
            type=raw,value=${{ inputs.runtime_version }}
          labels: |
            org.opencontainers.image.title=ohome-runtime
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.runtime_version }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./end
          file: ./end/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.app_version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            CHANNEL=stable
            RUNTIME_VERSION=${{ inputs.runtime_version }}
            DEFAULT_UPDATE_MANIFEST_URL=${{ env.DEFAULT_UPDATE_MANIFEST_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
