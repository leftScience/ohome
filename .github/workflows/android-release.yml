name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Android signing files
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/upload-keystore.jks

          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        working-directory: app
        shell: bash
        run: |
          BUILD_METADATA_FILE="$RUNNER_TEMP/ohome-release.env" \
          RELEASE_TAG="${GITHUB_REF_NAME}" \
          bash build_prod.sh

          cat "$RUNNER_TEMP/ohome-release.env" >> "$GITHUB_ENV"

      - name: Prepare release assets
        shell: bash
        run: |
          GH_PROXY_PREFIX="https://gh-proxy.org/"
          APK_SOURCE="app/${APK_RELATIVE_PATH}"
          APK_ASSET="app/build/app/outputs/flutter-apk/ohome-release.apk"
          MANIFEST_ASSET="app/build/app/outputs/flutter-apk/android.json"

          cp "$APK_SOURCE" "$APK_ASSET"
          APK_SHA256=$(shasum -a 256 "$APK_ASSET" | awk '{print $1}')

          cat > "$MANIFEST_ASSET" <<EOF
          {
            "versionName": "${BUILD_NAME}",
            "versionCode": ${BUILD_NUMBER},
            "apkUrl": "${GH_PROXY_PREFIX}https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ohome-release.apk",
            "sha256": "${APK_SHA256}",
            "releaseNotes": "GitHub Release ${GITHUB_REF_NAME}"
          }
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            app/build/app/outputs/flutter-apk/ohome-release.apk
            app/build/app/outputs/flutter-apk/android.json
