name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Android signing files
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/upload-keystore.jks

          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APKs
        working-directory: app
        shell: bash
        run: bash build_prod.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
