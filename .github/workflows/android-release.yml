name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Android signing files
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/upload-keystore.jks

          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Prepare MinIO settings
        shell: bash
        run: |
          test -n "${{ secrets.MINIO_ENDPOINT }}"
          test -n "${{ secrets.MINIO_ACCESS_KEY }}"
          test -n "${{ secrets.MINIO_SECRET_KEY }}"
          test -n "${{ secrets.MINIO_BUCKET }}"

          MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
          MINIO_ENDPOINT="${MINIO_ENDPOINT%/}"
          MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"
          MINIO_PUBLIC_BASE_URL="${{ secrets.MINIO_PUBLIC_BASE_URL }}"
          MINIO_PUBLIC_BASE_URL="${MINIO_PUBLIC_BASE_URL%/}"
          if [[ -z "${MINIO_PUBLIC_BASE_URL}" ]]; then
            MINIO_PUBLIC_BASE_URL="${MINIO_ENDPOINT}/${MINIO_BUCKET}"
          fi
          APP_UPDATE_MANIFEST_URL="${MINIO_PUBLIC_BASE_URL}/android/android.json"
          RELEASE_PREFIX="android/releases/${GITHUB_REF_NAME}"

          {
            echo "MINIO_ENDPOINT=${MINIO_ENDPOINT}"
            echo "MINIO_BUCKET=${MINIO_BUCKET}"
            echo "MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL}"
            echo "APP_UPDATE_MANIFEST_URL=${APP_UPDATE_MANIFEST_URL}"
            echo "RELEASE_PREFIX=${RELEASE_PREFIX}"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: app
        shell: bash
        run: |
          BUILD_METADATA_FILE="$RUNNER_TEMP/ohome-release.env" \
          APK_SPLIT_PER_ABI=0 \
          CI_BUILD_NUMBER="${GITHUB_RUN_NUMBER}" \
          RELEASE_TAG="${GITHUB_REF_NAME}" \
          APP_UPDATE_MANIFEST_URL="${APP_UPDATE_MANIFEST_URL}" \
          bash build_prod.sh

          cat "$RUNNER_TEMP/ohome-release.env" >> "$GITHUB_ENV"

      - name: Prepare release assets
        shell: bash
        run: |
          OUTPUT_DIR="app/build/app/outputs/flutter-apk"
          ABI="arm64-v8a"
          MANIFEST_ASSET="app/build/app/outputs/flutter-apk/android.json"
          VERSIONED_MANIFEST_ASSET="app/build/app/outputs/flutter-apk/android-${GITHUB_REF_NAME}.json"
          CHECKSUM_ASSET="app/build/app/outputs/flutter-apk/checksums-android.txt"
          SOURCE_APK="app/${APK_RELATIVE_PATH}"
          RELEASE_APK="${OUTPUT_DIR}/ohome-release-arm64-v8a.apk"
          VERSIONED_APK_URL="${MINIO_PUBLIC_BASE_URL}/${RELEASE_PREFIX}/ohome-release-${ABI}.apk"

          cp "$SOURCE_APK" "$RELEASE_APK"
          APK_SHA256=$(shasum -a 256 "$RELEASE_APK" | awk '{print $1}')
          printf '%s  %s\n' "$APK_SHA256" "ohome-release-arm64-v8a.apk" > "$CHECKSUM_ASSET"

          cat > "$MANIFEST_ASSET" <<EOF
          {
            "versionName": "${BUILD_NAME}",
            "versionCode": ${BUILD_NUMBER},
            "apkUrl": "${VERSIONED_APK_URL}",
            "sha256": "${APK_SHA256}",
            "releaseNotes": "Release ${GITHUB_REF_NAME}",
            "artifacts": {
              "${ABI}": {
                "apkUrl": "${VERSIONED_APK_URL}",
                "sha256": "${APK_SHA256}"
              }
            }
          }
          EOF
          cp "$MANIFEST_ASSET" "$VERSIONED_MANIFEST_ASSET"

      - name: Verify APK internal version
        shell: bash
        run: |
          APK_PATH="app/build/app/outputs/flutter-apk/ohome-release-arm64-v8a.apk"
          bash scripts/verify-android-apk-version.sh \
            "$APK_PATH" \
            "${BUILD_NAME}" \
            "${BUILD_NUMBER}"

      - name: Ensure AWS CLI
        shell: bash
        run: |
          if command -v aws >/dev/null 2>&1; then
            aws --version
          else
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
            aws --version
          fi

      - name: Upload Android assets to MinIO
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          aws configure set default.s3.addressing_style path

          OUTPUT_DIR="app/build/app/outputs/flutter-apk"
          VERSIONED_PREFIX="${RELEASE_PREFIX}"

          aws s3 cp "${OUTPUT_DIR}/ohome-release-arm64-v8a.apk" \
            "s3://${MINIO_BUCKET}/${VERSIONED_PREFIX}/ohome-release-arm64-v8a.apk" \
            --endpoint-url "${MINIO_ENDPOINT}" \
            --content-type "application/vnd.android.package-archive" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp "${OUTPUT_DIR}/android.json" \
            "s3://${MINIO_BUCKET}/android/android.json" \
            --endpoint-url "${MINIO_ENDPOINT}" \
            --content-type "application/json" \
            --cache-control "no-cache,no-store,must-revalidate"

          aws s3 cp "${OUTPUT_DIR}/android-${GITHUB_REF_NAME}.json" \
            "s3://${MINIO_BUCKET}/${VERSIONED_PREFIX}/android.json" \
            --endpoint-url "${MINIO_ENDPOINT}" \
            --content-type "application/json" \
            --cache-control "no-cache,no-store,must-revalidate"

          aws s3 cp "${OUTPUT_DIR}/checksums-android.txt" \
            "s3://${MINIO_BUCKET}/${VERSIONED_PREFIX}/checksums-android.txt" \
            --endpoint-url "${MINIO_ENDPOINT}" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "public,max-age=300"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            app/build/app/outputs/flutter-apk/ohome-release-arm64-v8a.apk
            app/build/app/outputs/flutter-apk/android.json
            app/build/app/outputs/flutter-apk/checksums-android.txt
