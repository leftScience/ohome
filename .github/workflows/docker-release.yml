name: Publish Docker Image

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

jobs:
  publish-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image names
        id: images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "::error::Missing DOCKERHUB_USERNAME secret."
            exit 1
          fi

          if [[ -z "$DOCKERHUB_TOKEN" ]]; then
            echo "::error::Missing DOCKERHUB_TOKEN secret."
            exit 1
          fi

          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name="${repo_name,,}"

          echo "ghcr_server=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_server=docker.io/${DOCKERHUB_USERNAME,,}/${repo_name}" >> "$GITHUB_OUTPUT"
          echo "ghcr_updater=ghcr.io/${GITHUB_REPOSITORY,,}-updater" >> "$GITHUB_OUTPUT"
          echo "dockerhub_updater=docker.io/${DOCKERHUB_USERNAME,,}/${repo_name}-updater" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract server Docker metadata
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.images.outputs.ghcr_server }}
            ${{ steps.images.outputs.dockerhub_server }}
          tags: |
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=ohome
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Extract updater Docker metadata
        id: meta_updater
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.images.outputs.ghcr_updater }}
            ${{ steps.images.outputs.dockerhub_updater }}
          tags: |
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=ohome-updater
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./end
          file: ./end/Dockerfile
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            CHANNEL=stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push updater image
        uses: docker/build-push-action@v6
        with:
          context: ./end
          file: ./end/Dockerfile.updater
          push: true
          tags: ${{ steps.meta_updater.outputs.tags }}
          labels: ${{ steps.meta_updater.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            CHANNEL=stable
          cache-from: type=gha
          cache-to: type=gha,mode=max
